# Cadence Engine Configuration
# -----------------------------------------
# SECURITY NOTE: All secrets MUST be provided via environment variables.
# This file contains NON-SENSITIVE defaults only.
#
# Required Environment Variables:
#   - APP_DATABASE_POSTGRESQL_PASSWORD: Database password for PostgreSQL
#   - ADMIN_AUTH0_DOMAIN: Auth0 tenant domain for admin JWT validation
#   - ADMIN_AUTH0_AUDIENCE: Auth0 API audience expected in JWT `aud` claim
#
# Optional Environment Variables:
#   - APP_DATABASE_POSTGRESQL_HOST: Override database host (default: localhost)
#   - APP_DATABASE_POSTGRESQL_PORT: Override database port (default: 5432)
#   - APP_DATABASE_POSTGRESQL_USER: Override database user (default: sm_admin)
#   - CADENCE_ADMIN_HTTP_ADDR: Admin HTTP server address (default: :8091)
#   - CADENCE_ADMIN_CORS_ORIGINS: CORS origins (default: http://localhost:4200)
# -----------------------------------------

APPLICATION:
  ENVIRONMENT: DEVELOPMENT
  PORT: 8091
  ALLOWED_ORIGINS:
    - "http://localhost:4200"
    - "*"

DATABASE:
  POSTGRESQL:
    HOST: localhost
    PORT: "5432"
    USER: sm_admin
    # PASSWORD provided via APP_DATABASE_POSTGRESQL_PASSWORD environment variable
    DB_NAME: subscription_manager
    SSL_MODE: disable
    MAX_OPEN_CONNS: 25
    MAX_IDLE_CONNS: 5
    CONN_MAX_LIFETIME: 1h
