basePath: /
definitions:
  domain.BackfillRequest:
    properties:
      end_index:
        type: integer
      entry_channel:
        description: Single channel (legacy support)
        type: string
      entry_channels:
        description: Multiple channels for rotation
        items:
          type: string
        type: array
      msisdns:
        description: optional explicit list to include
        items:
          type: string
        type: array
      product_ids:
        items:
          type: string
        type: array
      start_index:
        description: 0 or -1 means use full list
        type: integer
      telco:
        type: string
    type: object
  domain.BatchOptinRequest:
    properties:
      count:
        type: integer
      entry_channel:
        type: string
      msisdns:
        description: if provided, skip generation
        items:
          type: string
        type: array
      product_ids:
        items:
          type: string
        type: array
      telco:
        type: string
    type: object
  domain.ChargeRequest:
    properties:
      channel:
        type: string
      context:
        type: string
      mcc:
        type: string
      mnc:
        type: string
      msisdn:
        type: string
      pricepointId:
        type: integer
      productId:
        type: integer
      shortCode:
        type: string
    type: object
  domain.ChargeResponse:
    properties:
      code:
        type: string
      inError:
        type: boolean
      message:
        type: string
      requestId:
        type: string
      responseData:
        additionalProperties: true
        type: object
    type: object
  domain.EnhancedBackfillRequest:
    properties:
      batch_id:
        description: Enhanced features
        type: string
      batch_size:
        type: integer
      checkpoint_interval:
        type: integer
      dry_run:
        type: boolean
      end_index:
        type: integer
      entry_channel:
        type: string
      entry_channels:
        items:
          type: string
        type: array
      force_reprocess:
        type: boolean
      max_workers:
        type: integer
      msisdns:
        items:
          type: string
        type: array
      product_ids:
        items:
          type: string
        type: array
      rate_limit_per_second:
        type: integer
      start_index:
        type: integer
      telco:
        description: Basic fields from original BackfillRequest
        type: string
      use_charging_failures:
        type: boolean
    type: object
  domain.GetStatusRequest:
    properties:
      clientIp:
        type: string
      controlKeyword:
        type: string
      controlServiceKeyword:
        type: string
      entryChannel:
        type: string
      mcc:
        type: string
      mnc:
        type: string
      productId:
        type: integer
      subId:
        type: integer
      userIdentifier:
        type: string
      userIdentifierType:
        type: string
    type: object
  domain.MTResponse:
    properties:
      code:
        type: string
      inError:
        type: boolean
      message:
        type: string
      requestId:
        type: string
      responseData:
        additionalProperties: true
        type: object
    type: object
  domain.OptinRequest:
    properties:
      entry_channel:
        type: string
      msisdn:
        type: string
      product_ids:
        items:
          type: string
        type: array
      telco:
        type: string
    type: object
  domain.PriorityRetryQueue:
    description: Manages failed opt-ins that require immediate retry with exponential
      backoff
    properties:
      created_at:
        type: string
      id:
        type: integer
      last_attempt_at:
        type: string
      msisdn:
        type: string
      next_retry_at:
        type: string
      priority:
        type: integer
      product_id:
        type: string
      reason:
        type: string
      retry_count:
        type: integer
      status:
        type: string
      updated_at:
        type: string
    type: object
  domain.RenewalCycle:
    description: Tracks each step of the opt-out/opt-in renewal process
    properties:
      billing_status:
        type: string
      created_at:
        type: string
      cycle_number:
        type: integer
      id:
        type: integer
      msisdn:
        type: string
      opt_in_response:
        type: string
      opt_in_status:
        type: string
      opt_in_time:
        type: string
      opt_out_response:
        type: string
      opt_out_status:
        type: string
      opt_out_time:
        type: string
      product_id:
        type: string
      subscription_id:
        type: integer
      updated_at:
        type: string
    type: object
  domain.RenewalMetrics:
    description: Performance metrics for the renewal system
    properties:
      average_cycle_time:
        type: number
      churned_subscriptions:
        type: integer
      failed_renewals:
        type: integer
      last_run_time:
        type: string
      success_rate:
        type: number
      successful_renewals:
        type: integer
      total_processed:
        type: integer
    type: object
  domain.RenewalResponse:
    description: Response structure for renewal operations
    properties:
      billing_status:
        type: string
      cycle_id:
        type: integer
      error:
        type: string
      message:
        type: string
      msisdn:
        type: string
      opt_in_status:
        type: string
      opt_out_status:
        type: string
      product_id:
        type: string
      status:
        type: string
      success:
        type: boolean
    type: object
  domain.SubscriptionConfirmationRequest:
    properties:
      clientIp:
        type: string
      entryChannel:
        type: string
      mcc:
        type: string
      mnc:
        type: string
      productId:
        type: integer
      transactionAuthCode:
        type: string
      userIdentifier:
        type: string
      userIdentifierType:
        type: string
    type: object
  domain.SubscriptionWithRenewalInfo:
    properties:
      campaignUrl:
        type: string
      cancelReason:
        type: string
      cancelSource:
        type: string
      clientIp:
        type: string
      consecutive_payment_failures:
        type: integer
      createdAt:
        type: string
      endDate:
        type: string
      entryChannel:
        type: string
      id:
        type: integer
      largeAccount:
        type: string
      last_renewal_attempt:
        type: string
      last_successful_payment:
        type: string
      mcc:
        type: string
      mnc:
        type: string
      partnerRoleId:
        type: string
      productId:
        type: string
      renewal_status:
        type: string
      startDate:
        type: string
      status:
        type: string
      subKeyword:
        type: string
      total_renewal_attempts:
        type: integer
      trackingId:
        type: string
      transactionAuthCode:
        type: string
      userIdentifier:
        type: string
      userIdentifierType:
        type: string
    type: object
  domain.UnsubscriptionRequest:
    properties:
      cancelReason:
        type: integer
      cancelSource:
        type: integer
      clientIp:
        type: string
      controlKeyword:
        type: string
      controlServiceKeyword:
        type: string
      entryChannel:
        type: string
      largeAccount:
        type: string
      mcc:
        type: string
      mnc:
        type: string
      productId:
        type: integer
      subId:
        type: integer
      subKeyword:
        type: string
      trackingId:
        type: string
      userIdentifier:
        type: string
      userIdentifierType:
        type: string
    type: object
  handler.ChurnEvaluationResponse:
    description: Result of a churn evaluation operation
    properties:
      churned:
        description: Number of subscriptions churned
        example: 25
        type: integer
      message:
        description: Result message
        example: Churn evaluation completed
        type: string
      processed:
        description: Number of subscriptions processed
        example: 150
        type: integer
      renewed:
        description: Number of subscriptions renewed
        example: 125
        type: integer
      status:
        description: Operation status
        example: success
        type: string
    type: object
  handler.ManualRenewalRequest:
    description: Request structure for manual renewal
    properties:
      channel:
        description: Entry channel
        example: API
        type: string
      msisdn:
        description: Mobile number
        example: "1234567890"
        type: string
      product_id:
        description: Product identifier
        example: PROD_001
        type: string
    required:
    - msisdn
    - product_id
    type: object
  handler.RenewalHealthResponse:
    description: Health status of the renewal system
    properties:
      timestamp:
        description: Health check timestamp
        example: "2024-01-01T00:00:00Z"
        type: string
      worker_health:
        additionalProperties: true
        description: Worker health details
        type: object
      worker_running:
        description: Worker status
        example: true
        type: boolean
    type: object
  handler.RenewalWorkerStatus:
    description: Status and metrics of the renewal worker
    properties:
      metrics:
        allOf:
        - $ref: '#/definitions/domain.RenewalMetrics'
        description: Worker metrics
      running:
        description: Whether the worker is running
        example: true
        type: boolean
    type: object
  handler.partnerMtRequest:
    properties:
      context:
        type: string
      largeAccount:
        type: string
      mcc:
        type: string
      mnc:
        type: string
      moTransactionUUID:
        type: string
      msisdn:
        type: string
      pricepointId:
        type: integer
      priority:
        type: string
      productId:
        type: integer
      sendDate:
        type: string
      text:
        description: Not used by current upstream optin API, accepted for compatibility
        type: string
      timezone:
        type: string
    type: object
  monitoring.AlertThresholds:
    properties:
      database_errors:
        description: Alert if > 10 in 1 hour
        type: integer
      high_failure_rate:
        description: Alert if > 80%
        type: number
      high_queue_size:
        description: Alert if > 10000
        type: integer
      low_success_rate:
        description: Alert if < 60%
        type: number
      processing_delay:
        description: Alert if > 5 minutes
        type: number
      service_unavailable:
        description: Alert if service down
        type: boolean
    type: object
  worker.ProcessingConfig:
    type: object
host: localhost:8083
info:
  contact:
    email: support@omni-connect.com
    name: API Support
    url: https://omni-connect.com/support
  description: '|'
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://omni-connect.com/terms/
  title: TIMWE Subscription External Service API
  version: "1.0"
paths:
  /api/external/v1/{channel}/mt:
    post:
      consumes:
      - application/json
      description: Implements /api/external/v1/{realm}/{channel}/mt/{partnerRole}
      parameters:
      - description: Channel (SMS/WEB/IVR/USSD)
        in: path
        name: channel
        required: true
        type: string
      - description: MT request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.partnerMtRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MTResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Send MT to TIMWE Partner MA Platform
      tags:
      - PartnerMt
  /api/external/v1/charge/dob:
    post:
      consumes:
      - application/json
      description: Implements /api/external/v1/{realm}/charge/dob/{partnerRole}
      parameters:
      - description: Charging request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.ChargeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ChargeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Request Direct Billing charge to TIMWE Partner MA Platform
      tags:
      - PartnerDobCharging
  /api/external/v1/subscription/optin/confirm:
    post:
      consumes:
      - application/json
      description: Implements /api/external/v1/{realm}/subscription/optin/confirm/{partnerRole}
      parameters:
      - description: Confirmation request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.SubscriptionConfirmationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MTResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Confirm double opt-in via TIMWE Partner MA Platform
      tags:
      - PartnerOptinConfirm
  /api/external/v1/subscription/optout:
    post:
      consumes:
      - application/json
      description: Implements /api/external/v1/subscription/optout/{partnerRole}
      parameters:
      - description: Unsubscription request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UnsubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MTResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Unsubscribe user via TIMWE Partner MA Platform
      tags:
      - PartnerOptout
  /api/external/v1/subscription/status:
    post:
      consumes:
      - application/json
      description: Implements /api/external/v1/{realm}/subscription/status/{partnerRole}
      parameters:
      - description: Status request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.GetStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MTResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Get subscription status from TIMWE Partner MA Platform
      tags:
      - PartnerStatus
  /api/v1/renewal/churn-candidates:
    get:
      description: Returns subscriptions that are candidates for churn based on policy
      parameters:
      - default: 100
        description: 'Maximum number of candidates to return (default: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Churn candidates
          schema:
            items:
              $ref: '#/definitions/domain.SubscriptionWithRenewalInfo'
            type: array
        "500":
          description: Failed to get churn candidates
          schema:
            type: string
      summary: Get churn candidates
      tags:
      - Renewal Monitoring
  /api/v1/renewal/cycles:
    get:
      description: Returns renewal cycles with optional filtering by status
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - default: 100
        description: 'Maximum number of cycles to return (default: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Renewal cycles
          schema:
            items:
              $ref: '#/definitions/domain.RenewalCycle'
            type: array
        "501":
          description: Method not implemented
          schema:
            type: string
      summary: Get renewal cycles
      tags:
      - Renewal Monitoring
  /api/v1/renewal/force-churn-evaluation:
    post:
      consumes:
      - application/json
      description: Forces a churn evaluation for all subscriptions based on policy
      parameters:
      - default: 1000
        description: 'Maximum number of subscriptions to evaluate (default: 1000)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Churn evaluation completed
          schema:
            $ref: '#/definitions/handler.ChurnEvaluationResponse'
        "500":
          description: Failed to evaluate churn candidates
          schema:
            type: string
      summary: Force churn evaluation
      tags:
      - Renewal Operations
  /api/v1/renewal/health:
    get:
      description: Returns the health status of the renewal system
      produces:
      - application/json
      responses:
        "200":
          description: System health status
          schema:
            $ref: '#/definitions/handler.RenewalHealthResponse'
        "503":
          description: Worker not available
          schema:
            type: string
      summary: Get renewal system health
      tags:
      - Renewal Monitoring
  /api/v1/renewal/manual:
    post:
      consumes:
      - application/json
      description: Triggers a manual renewal for a specific subscription
      parameters:
      - description: Renewal request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ManualRenewalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Renewal response
          schema:
            $ref: '#/definitions/domain.RenewalResponse'
        "400":
          description: Invalid request body or missing fields
          schema:
            type: string
        "404":
          description: Product not found
          schema:
            type: string
        "500":
          description: Failed to process renewal
          schema:
            type: string
      summary: Manual renewal
      tags:
      - Renewal Operations
  /api/v1/renewal/priority-retry:
    get:
      description: Returns items currently in the priority retry queue
      produces:
      - application/json
      responses:
        "200":
          description: Priority retry queue items
          schema:
            items:
              $ref: '#/definitions/domain.PriorityRetryQueue'
            type: array
        "501":
          description: Method not implemented
          schema:
            type: string
      summary: Get priority retry queue
      tags:
      - Renewal Monitoring
  /api/v1/renewal/priority-retry/process:
    post:
      consumes:
      - application/json
      description: Processes the priority retry queue for failed opt-ins
      produces:
      - application/json
      responses:
        "200":
          description: Queue processed successfully
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Failed to process queue
          schema:
            type: string
        "503":
          description: Worker not available
          schema:
            type: string
      summary: Process priority retry queue
      tags:
      - Renewal Operations
  /api/v1/renewal/statistics:
    get:
      description: Returns renewal statistics for the specified number of days
      parameters:
      - default: 30
        description: 'Number of days to look back (default: 30)'
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Renewal statistics
          schema:
            $ref: '#/definitions/domain.RenewalMetrics'
        "500":
          description: Failed to get statistics
          schema:
            type: string
      summary: Get renewal statistics
      tags:
      - Renewal Monitoring
  /api/v1/renewal/worker/start:
    post:
      consumes:
      - application/json
      description: Starts the automated renewal worker that processes subscription
        renewals
      produces:
      - application/json
      responses:
        "200":
          description: Worker started successfully
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Worker already running
          schema:
            type: string
        "500":
          description: Failed to start worker
          schema:
            type: string
        "503":
          description: Worker not available
          schema:
            type: string
      summary: Start renewal worker
      tags:
      - Renewal Worker
  /api/v1/renewal/worker/status:
    get:
      description: Returns the current status and metrics of the renewal worker
      produces:
      - application/json
      responses:
        "200":
          description: Worker status and metrics
          schema:
            $ref: '#/definitions/handler.RenewalWorkerStatus'
        "503":
          description: Worker not available
          schema:
            type: string
      summary: Get renewal worker status
      tags:
      - Renewal Worker
  /api/v1/renewal/worker/stop:
    post:
      consumes:
      - application/json
      description: Stops the automated renewal worker
      produces:
      - application/json
      responses:
        "200":
          description: Worker stopped successfully
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Worker not running
          schema:
            type: string
        "500":
          description: Failed to stop worker
          schema:
            type: string
        "503":
          description: Worker not available
          schema:
            type: string
      summary: Stop renewal worker
      tags:
      - Renewal Worker
  /api/v1/subscription-external:
    post:
      consumes:
      - application/json
      description: Opt-in a user subscription with the provided details
      parameters:
      - description: Optin Request
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/domain.OptinRequest'
      produces:
      - application/json
      responses:
        "200":
          description: "200"
          schema:
            type: string
        "400":
          description: Invalid\t query parameters
          schema: {}
        "500":
          description: Internal server error
          schema: {}
      summary: Opt-in a single subscription
      tags:
      - Subscriptions
  /api/v1/subscription-external/backfill:
    post:
      consumes:
      - application/json
      description: If msisdns not provided, finds active MSISDNs missing the provided
        product_ids and enqueues opt-in jobs.
      parameters:
      - description: Backfill Request
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/domain.BackfillRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted with jobId
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request payload
          schema:
            type: string
      summary: Backfill subscriptions for MSISDNs missing specified products (async)
      tags:
      - Subscriptions
  /api/v1/subscription-external/batch:
    post:
      consumes:
      - application/json
      description: Enqueue a batch job and return jobId to poll status.
      parameters:
      - description: Batch Optin Request
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/domain.BatchOptinRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted with jobId
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request payload or error generating MSISDNS
          schema:
            type: string
      summary: Batch Opt-in subscriptions (async)
      tags:
      - Subscriptions
  /api/v1/subscription-external/charging-failures:
    get:
      consumes:
      - application/json
      description: Get subscriptions with charging failures using notifications-based
        analysis with filtering and pagination
      parameters:
      - description: 'Maximum number of results to return (default: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Number of results to skip (default: 0)'
        in: query
        name: offset
        type: integer
      - description: 'Filter by days since last charge notification (default: 30)'
        in: query
        name: days_threshold
        type: integer
      - description: Filter by subscription status
        in: query
        name: status
        type: string
      - description: Filter by charging health status
        in: query
        name: health_status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Charging failures retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get charging failed subscriptions
      tags:
      - ChargingFailures
  /api/v1/subscription-external/charging-failures/stats:
    get:
      consumes:
      - application/json
      description: Get comprehensive statistics about charging failures including
        counts, rates, and trends
      produces:
      - application/json
      responses:
        "200":
          description: Charging failure statistics retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get charging failure statistics
      tags:
      - ChargingFailures
  /api/v1/subscription-external/charging-failures/summary:
    get:
      consumes:
      - application/json
      description: Get a categorized summary of charging failures by health status
        and failure reasons
      produces:
