# Subscription External Service Configuration
# -----------------------------------------
# SECURITY NOTE: All secrets MUST be provided via environment variables.
# This file contains NON-SENSITIVE defaults only.
#
# Required Environment Variables:
#   - APP_DATABASE_POSTGRESQL_PASSWORD: Database password
#   - TIMWE_API_KEY: TIMWE API key
#   - TIMWE_PSK: TIMWE Pre-Shared Key
#   - JWT_SECRET: JWT signing secret
#
# Optional Environment Variables:
#   - APP_DATABASE_POSTGRESQL_HOST: Override database host (default: localhost)
#   - APP_DATABASE_POSTGRESQL_PORT: Override database port (default: 5432)
#   - APP_DATABASE_POSTGRESQL_USER: Override database user (default: sm_admin)
#   - APP_CACHE_REDIS_HOST: Override Redis host (default: localhost)
#   - APP_CACHE_REDIS_PORT: Override Redis port (default: 6379)
#   - ACQUISITION_API_URL: URL for acquisition-api service
# -----------------------------------------

APPLICATION:
  ENVIRONMENT: DEVELOPMENT
  PORT: 8083
  ALLOWED_ORIGINS:
    - http://localhost:4200
    - https://admin.nouveauricheglobalgroup.com
    - https://api.nouveauricheglobalgroup.com
  HTTP:
    READ_TIMEOUT: 60s
    WRITE_TIMEOUT: 60s
    IDLE_TIMEOUT: 120s
    MAX_REQUEST_BODY_MB: 16
    CONCURRENCY: 0 # 0 lets fasthttp pick based on GOMAXPROCS
  BATCH:
    MAX_WORKERS_PER_JOB: 200
    MAX_CONCURRENT_OPTINS: 200
    TARGET_QPS: 500
  # MSISDN Generator Configuration
  MSISDN_GENERATOR:
    ENABLED: true
    BATCH_SIZE: 1000
    MAX_CONCURRENT: 50
    MAX_MSISDN_COUNT: 1000000
    CACHE_ENABLED: true
    BLOOM_FILTER_ENABLED: true
    FALSE_POSITIVE_RATE: 0.01
    VALIDATION_TIMEOUT: 30s
    GENERATION_TIMEOUT: 60s
    WORKER_POOL_SIZE: 100
    CHANNEL_BUFFER_SIZE: 2000
    FALLBACK_TO_DATABASE: true
    MAX_RETRY_ATTEMPTS: 3
    PRELOAD_ENABLED: true
    PRELOAD_BATCH_SIZE: 10000
  TIMWE_MA:
    HOST: https://tigo.timwe.com/gh
    APPLICATION_PATH: /api/external/v1
    BASE_URL: https://tigo.timwe.com/gh/ma/api/external/v1
    # API_KEY provided via TIMWE_API_KEY environment variable
    # MT_API_KEY provided via TIMWE_MT_API_KEY environment variable
    # PSK provided via TIMWE_PSK environment variable
    PARTNER_ROLE_ID: 2117
    PARTNER_SERVICE_ID: 2170
    REALM: realm
    AUTHENTICATION_KEY: ""
    TIMEOUT: 30s
    MAX_CONNECTIONS: 2000
    DIAL_TIMEOUT: 10s
    MAX_CONN_DURATION: 60s
    IDLE_CONN_TIMEOUT: 30s
    MCC: "620"
    MNC: "03"
    CB_MAX_REQUESTS: 200
    CB_TIMEOUT: 15s
    CB_INTERVAL: 0s
    CB_MIN_REQUESTS: 100
    CB_FAILURE_RATE_THRESHOLD: 0.8
    CB_CONSECUTIVE_FAILURES: 10
    MT: /subscription/optin/:partnerRoleId
    OPT_IN: /subscription/optin/:partnerRoleId
    OPT_OUT: /subscription/optin/:partnerRoleId
    CHARGE_RETRY_MAX_DURATION: 2m
    CHARGE_RETRY_BASE_DELAY: 200ms
    CHARGE_RETRY_MAX_DELAY: 5s
  TELCO_PREFIXES:
    AirtelTigo:
      [
        "233278", "233203", "233578", "233242", "233307", "233245", "233247",
        "233576", "233271", "233273", "233571", "233277", "233233", "233544",
        "233561", "233579", "233317", "233243", "233265", "233246", "233285",
        "233270", "233267", "233542", "233572", "233276", "233264", "233200",
        "233556", "233263", "233274", "233577", "233261", "233275", "233268",
        "233272", "233269", "233337", "233543", "233208", "233262", "233575",
        "233573", "233570", "233249", "233232", "233244", "233574", "233279",
        "233266", "233260", "233236", "233560", "233240", "233546", "233549"
      ]
    MTN: ["233540", "233550", "233244", "233240"]
    Vodafone: ["233201", "233202", "233203"]
  MSISDN_VALIDATION:
    CACHE_EXPIRY: "30m"
    ENABLE_PREFIX_VALIDATION: true
    ENABLE_EXCLUDED_USER_CHECK: true
    ENABLE_INVALID_LOG_CHECK: true
    MAX_VALIDATION_ERRORS: 1000
    TELCO_PREFIXES:
      MTN:
        - "23324"
