  NETWORK_RESILIENCE:
    MAX_RETRIES: 5
    BASE_RETRY_DELAY: "200ms"
    MAX_RETRY_DELAY: "30s"
    CONNECTION_TIMEOUT: "10s"
    READ_TIMEOUT: "30s"
    WRITE_TIMEOUT: "30s"
    MAX_CONNS_PER_HOST: 200
    MAX_IDLE_CONN_DURATION: "60s"
    CIRCUIT_BREAKER_THRESHOLD: 3
    CIRCUIT_BREAKER_TIMEOUT: "30s"
    JITTER_ENABLED: true
  ENHANCED_MONITORING:
    ENABLE_AUTOMATED_RECOVERY: true
    RECOVERY_COOLDOWN: "5m"
    MAX_RECOVERY_ATTEMPTS: 3
    HEALTH_CHECK_INTERVAL: "30s"
    ALERT_COOLDOWN: "2m"
    ENABLE_REAL_TIME_METRICS: true
  LOG:
    PATH: /var/log/subscription-external-app.log
    ROLLING:
      ENABLED: true
      MAX_SIZE: 100
      MAX_AGE: 30
      MAX_BACKUPS: 10
      COMPRESS: true
      COMPRESS_THRESHOLD: 10
      LOCAL_TIME: true
  KEY:
    DEFAULT: default_key_value
    RSA:
      PUBLIC: /path/to/public.key
      PRIVATE: /path/to/private.key
  GRACEFUL:
    MAX_SECOND: 30s

AUTH:
  JWT_TOKEN:
    TYPE: Bearer
    EXPIRED: 24h
    REFRESH_EXPIRED: 72h
    # SECRET provided via JWT_SECRET environment variable

# Enhanced Database Configuration
DATABASE:
  POSTGRESQL:
    HOST: localhost
    PORT: 5432
    USER: sm_admin
    # PASSWORD provided via APP_DATABASE_POSTGRESQL_PASSWORD environment variable
    DB_NAME: subscription_manager
    SSL_MODE: disable
    MAX_OPEN_CONNS: 100
    MAX_IDLE_CONNS: 25
    CONN_MAX_LIFETIME: 300s
    QUERY_TIMEOUT: 30s
    CONNECTION_TIMEOUT: 10s
    TRANSACTION_TIMEOUT: 60s
    POOL_TIMEOUT: 5s

CACHE:
  REDIS:
    HOST: localhost
    PORT: 6379
    DB: 0
    PASS: ""
    BLOOM_FILTER:
      ENABLED: true
      EXPECTED_ITEMS: 1000000
      FALSE_POSITIVE_RATE: 0.01
      TTL: 24h
      PRELOAD_ENABLED: true
      PRELOAD_BATCH_SIZE: 10000

# Monitoring and Alerting Configuration
MONITORING:
  CHARGING_FAILURE:
    HIGH_FAILURE_RATE: 50.0
    LOW_SUCCESS_RATE: 70.0
    HIGH_QUEUE_SIZE: 5000
    PROCESSING_DELAY: 3.0
    DATABASE_ERRORS: 5
  HEALTH_CHECK:
    INTERVAL: "30s"
    TIMEOUT: "10s"
    MAX_FAILURES: 3
    ENABLE_METRICS: true
    ENABLE_ALERTS: true
  METRICS_CACHE:
    DEFAULT_TTL: "5m"
    MAX_ENTRIES: 1000
    CLEANUP_INTERVAL: "1m"
    ENABLE_STATS: true
    COMPRESSION: false

# Worker Configuration
WORKER:
  RESUBSCRIPTION:
    MAX_WORKERS: 20
    BATCH_SIZE: 100
    PROCESSING_TIMEOUT: "10m"
    RETRY_ATTEMPTS: 3
    RETRY_DELAY: "5s"
  RENEWAL:
    MAX_WORKERS: 10
    BATCH_SIZE: 50
    PROCESSING_TIMEOUT: "5m"
    RETRY_ATTEMPTS: 2
    RETRY_DELAY: "10s"

# Security Configuration
SECURITY:
  JWT:
    # SECRET provided via JWT_SECRET environment variable
    EXPIRY: "24h"
    REFRESH_EXPIRY: "7d"
  RATE_LIMIT:
    REQUESTS_PER_MINUTE: 1000
    BURST_SIZE: 100
  CORS:
    ALLOWED_ORIGINS: ["*"]
    ALLOWED_METHODS: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    ALLOWED_HEADERS: ["*"]
    EXPOSED_HEADERS: ["Content-Length"]
    ALLOW_CREDENTIALS: true
    MAX_AGE: "86400"

# Feature Flags
FEATURES:
  ENABLE_MSISDN_VALIDATION: true
  ENABLE_NETWORK_RESILIENCE: true
  ENABLE_ENHANCED_MONITORING: true
  ENABLE_AUTOMATED_RECOVERY: true
  ENABLE_BATCH_PROCESSING: true
  ENABLE_CIRCUIT_BREAKER: true
  ENABLE_RETRY_MECHANISMS: true
  ENABLE_CACHING: true
  ENABLE_METRICS: true
  ENABLE_ALERTING: true
