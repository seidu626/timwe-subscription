# API Gateway - HTTPS
# Primary API host - KrakenD gateway, but also serves landing pages for HE flow
server {
    listen 443 ssl http2;
    server_name api.nouveauricheglobalgroup.com;

    ssl_certificate /etc/ssl/fullchain.pem;
    ssl_certificate_key /etc/ssl/STAR_nouveauricheglobalgroup_com.key;

    # ============================================
    # Campaign landing pages (for HE bootstrap redirect to same host)
    # ============================================
    # Canonical path: /lp/:slug (served by landing-web)
    # HE bootstrap redirects to https://api.*/lp/:slug?he_token=...
    location ^~ /lp/ {
        proxy_pass http://landing-web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SECURITY: Strip real operator HE headers
        proxy_set_header X-MSISDN "";
        proxy_set_header X-UP-CALLING-LINE-ID "";
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN "";
        
        # Forward HE simulation headers
        proxy_set_header X-He-Source $http_x_he_source;
        proxy_set_header X-He-Msisdn $http_x_he_msisdn;
        proxy_set_header X-He-Operator $http_x_he_operator;
        proxy_set_header X-He-Mcc $http_x_he_mcc;
        proxy_set_header X-He-Mnc $http_x_he_mnc;
    }

    # Alias path: /c/:slug -> redirects to /lp/:slug via landing-web
    # Kept for backward compatibility with old links
    location ^~ /c/ {
        proxy_pass http://landing-web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SECURITY: Strip real operator HE headers
        proxy_set_header X-MSISDN "";
        proxy_set_header X-UP-CALLING-LINE-ID "";
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN "";
        
        # Forward HE simulation headers
        proxy_set_header X-He-Source $http_x_he_source;
        proxy_set_header X-He-Msisdn $http_x_he_msisdn;
        proxy_set_header X-He-Operator $http_x_he_operator;
        proxy_set_header X-He-Mcc $http_x_he_mcc;
        proxy_set_header X-He-Mnc $http_x_he_mnc;
    }
    
    # ============================================
    # Next.js static assets (required for landing pages on api.*)
    # ============================================
    location ^~ /_next/ {
        proxy_pass http://landing-web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Static files that landing pages might need
    location = /favicon.ico {
        proxy_pass http://landing-web;
        proxy_http_version 1.1;
    }
    
    location = /robots.txt {
        proxy_pass http://landing-web;
        proxy_http_version 1.1;
    }

    # ============================================
    # HE bootstrap HTTPS fallback
    # ============================================
    # Over HTTPS, no operator HE headers are present.
    # Proxy to acquisition-api anyway — handler will redirect to landing page
    # without a token (user goes through OTP flow instead).
    location /he/bootstrap {
        proxy_pass http://acquisition-api/v1/he/bootstrap;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-HE-Trusted-Proxy $he_trusted_proxy;

        # No real HE headers on HTTPS — strip any spoofed ones
        proxy_set_header X-MSISDN "";
        proxy_set_header X-UP-CALLING-LINE-ID "";
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN "";
    }

    # ============================================
    # KrakenD API Gateway (default for API routes)
    # ============================================
    location / {
        proxy_pass http://krakend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header External-Tx-Id $http_external_tx_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SECURITY: Strip real operator HE headers from HTTPS traffic
        proxy_set_header X-MSISDN "";
        proxy_set_header X-UP-CALLING-LINE-ID "";
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN "";
        
        # Forward HE simulation headers (set by frontend after token exchange)
        proxy_set_header X-He-Source $http_x_he_source;
        proxy_set_header X-He-Msisdn $http_x_he_msisdn;
        proxy_set_header X-He-Operator $http_x_he_operator;
        proxy_set_header X-He-Mcc $http_x_he_mcc;
        proxy_set_header X-He-Mnc $http_x_he_mnc;
        
        # Forward token for exchange endpoint
        proxy_set_header X-HE-Bootstrap-Token $http_x_he_bootstrap_token;
    }

    # Health check
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
