# ============================================
# HTTP server for Landing Pages (HE bootstrap + redirect)
# ============================================
# This server handles HTTP-only Header Enrichment from Ghana MNOs.
# HE bootstrap paths are proxied to backend; all else redirects to HTTPS.
server {
    listen 80;
    server_name landing.nouveauricheglobalgroup.com;
    
    # ============================================
    # HE Bootstrap Path (HTTP only, from operator proxy)
    # ============================================
    # This endpoint captures MSISDN from operator-injected headers,
    # creates a short-lived token, and redirects to HTTPS.
    #
    # SECURITY: HE headers are only forwarded if $he_trusted_proxy=1
    # (see he-bootstrap.conf for geo block definition)
    location /he/bootstrap {
        # Rate limit to prevent abuse
        limit_req zone=he_bootstrap_limit burst=20 nodelay;
        access_log /var/log/nginx/he_bootstrap.log he_debug;

        # Only allow from trusted operator proxies
        # For discovery phase, you can comment this out temporarily
        if ($he_trusted_proxy = 0) {
            return 403 "Forbidden: Not from trusted operator proxy";
        }
        
        # Proxy to acquisition-api HE bootstrap handler
        proxy_pass http://acquisition-api/v1/he/bootstrap;
        proxy_http_version 1.1;
        
        # Forward request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Forward HE headers (only non-empty if from trusted proxy)
        proxy_set_header X-MSISDN $safe_x_msisdn;
        proxy_set_header X-UP-CALLING-LINE-ID $safe_x_up_calling_line_id;
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN $safe_x_wap_network_client_msisdn;
        proxy_set_header X-MCC $safe_x_mcc;
        proxy_set_header X-MNC $safe_x_mnc;
        proxy_set_header X-Operator-ID $safe_x_operator_id;
        
        # Indicate this came from trusted proxy
        proxy_set_header X-HE-Trusted-Proxy $he_trusted_proxy;
    }
    
    # ============================================
    # Campaign landing shortlinks with HE capture
    # ============================================
    # Pattern: /c/{tenant_key}/{campaign_slug} - tenant-specific ad links on HTTP
    location ~ ^/c/([a-zA-Z0-9_-]+)/([a-zA-Z0-9_-]+)$ {
        # Rate limit
        limit_req zone=he_bootstrap_limit burst=50 nodelay;

        # Proxy to acquisition-api HE bootstrap with tenant campaign context
        proxy_pass http://acquisition-api/v1/he/bootstrap/campaign/$1/$2$is_args$args;
        proxy_http_version 1.1;

        # Forward request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward HE headers (safe versions - empty if not from trusted proxy)
        proxy_set_header X-MSISDN $safe_x_msisdn;
        proxy_set_header X-UP-CALLING-LINE-ID $safe_x_up_calling_line_id;
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN $safe_x_wap_network_client_msisdn;
        proxy_set_header X-MCC $safe_x_mcc;
        proxy_set_header X-MNC $safe_x_mnc;
        proxy_set_header X-Operator-ID $safe_x_operator_id;

        # Indicate trusted proxy status
        proxy_set_header X-HE-Trusted-Proxy $he_trusted_proxy;
    }

    # Pattern: /c/{campaign_slug} - ad networks link here on HTTP
    # This captures HE headers before redirecting to HTTPS
    location ~ ^/c/([a-zA-Z0-9_-]+)$ {
        # Rate limit
        limit_req zone=he_bootstrap_limit burst=50 nodelay;
        
        # Proxy to acquisition-api HE bootstrap with campaign context
        proxy_pass http://acquisition-api/v1/he/bootstrap/campaign/$1$is_args$args;
        proxy_http_version 1.1;
        
        # Forward request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Forward HE headers (safe versions - empty if not from trusted proxy)
        proxy_set_header X-MSISDN $safe_x_msisdn;
        proxy_set_header X-UP-CALLING-LINE-ID $safe_x_up_calling_line_id;
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN $safe_x_wap_network_client_msisdn;
        proxy_set_header X-MCC $safe_x_mcc;
        proxy_set_header X-MNC $safe_x_mnc;
        proxy_set_header X-Operator-ID $safe_x_operator_id;
        
        # Indicate trusted proxy status
        proxy_set_header X-HE-Trusted-Proxy $he_trusted_proxy;
    }
    
    # ============================================
    # All other HTTP traffic -> HTTPS redirect
    # ============================================
    location / {
        return 301 https://$host$request_uri;
    }
}

# Admin Panel - HTTPS
server {
    listen 443 ssl http2;
    server_name admin.nouveauricheglobalgroup.com;

    ssl_certificate /etc/ssl/fullchain.pem;
    ssl_certificate_key /etc/ssl/STAR_nouveauricheglobalgroup_com.key;

    location / {
        proxy_pass http://webspa-admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Landing Pages - HTTPS
server {
    listen 443 ssl http2;
    server_name landing.nouveauricheglobalgroup.com;

    ssl_certificate /etc/ssl/fullchain.pem;
    ssl_certificate_key /etc/ssl/STAR_nouveauricheglobalgroup_com.key;

    location / {
        proxy_pass http://landing-web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SECURITY: Strip real operator HE headers from HTTPS traffic
        # These should NEVER come from HTTPS - they are HTTP-only from operator proxy
        # Anyone sending these on HTTPS is attempting to spoof
        proxy_set_header X-MSISDN "";
        proxy_set_header X-UP-CALLING-LINE-ID "";
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN "";
        
        # Forward HE simulation headers (from cookie-based simulation flow)
        # These are internal headers set by the frontend after token exchange
        proxy_set_header X-He-Source $http_x_he_source;
        proxy_set_header X-He-Msisdn $http_x_he_msisdn;
        proxy_set_header X-He-Operator $http_x_he_operator;
        proxy_set_header X-He-Mcc $http_x_he_mcc;
        proxy_set_header X-He-Mnc $http_x_he_mnc;
    }
    
    # API calls from landing page to acquisition-api (via KrakenD)
    location /api/ {
        proxy_pass http://krakend/;
        proxy_http_version 1.1;
        proxy_set_header Host api.nouveauricheglobalgroup.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SECURITY: Strip real operator HE headers - these are spoofed on HTTPS
        proxy_set_header X-MSISDN "";
        proxy_set_header X-UP-CALLING-LINE-ID "";
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN "";
        
        # Forward HE simulation headers for API calls
        proxy_set_header X-He-Source $http_x_he_source;
        proxy_set_header X-He-Msisdn $http_x_he_msisdn;
        proxy_set_header X-He-Operator $http_x_he_operator;
        proxy_set_header X-He-Mcc $http_x_he_mcc;
        proxy_set_header X-He-Mnc $http_x_he_mnc;
    }
}

