# SSL Configuration for Nouveauriche Global
# Prerequisites:
# 1. Create fullchain.pem: cat STAR_nouveauricheglobalgroup.crt ca-bundle.crt > fullchain.pem
# 2. Place in /etc/ssl/ directory on server
#
# NOTE: Upstream definitions are in default.conf (webspa-admin, landing-web, krakend)
# NOTE: Global SSL settings (ssl_protocols, ssl_ciphers, etc.) are in /etc/nginx/nginx.conf
# NOTE: HE bootstrap geo blocks and maps are in he-bootstrap.conf

# ============================================
# HTTP server for admin (always redirect to HTTPS)
# ============================================
server {
    listen 80;
    server_name admin.nouveauricheglobalgroup.com;
    return 301 https://$host$request_uri;
}

# ============================================
# HTTP server for API (HE bootstrap + redirect)
# ============================================
# Operator HE is mapped to http://api.* - we capture HE headers here
# and redirect to HTTPS on same host after minting token.
server {
    listen 80;
    server_name api.nouveauricheglobalgroup.com;
    
    # HE Bootstrap Path
    location /he/bootstrap {
        limit_req zone=he_bootstrap_limit burst=20 nodelay;
        access_log /var/log/nginx/he_bootstrap.log he_debug;

        if ($he_trusted_proxy = 0) {
            return 403 "Forbidden: Not from trusted operator proxy";
        }

        proxy_pass http://acquisition-api/v1/he/bootstrap;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-MSISDN $safe_x_msisdn;
        proxy_set_header X-UP-CALLING-LINE-ID $safe_x_up_calling_line_id;
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN $safe_x_wap_network_client_msisdn;
        proxy_set_header X-MCC $safe_x_mcc;
        proxy_set_header X-MNC $safe_x_mnc;
        proxy_set_header X-Operator-ID $safe_x_operator_id;
        proxy_set_header X-HE-Trusted-Proxy $he_trusted_proxy;
    }

    # Tenant-scoped campaign shortlinks with HE capture
    location ~ ^/c/([a-zA-Z0-9_-]+)/([a-zA-Z0-9_-]+)$ {
        limit_req zone=he_bootstrap_limit burst=50 nodelay;

        proxy_pass http://acquisition-api/v1/he/bootstrap/campaign/$1/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-MSISDN $safe_x_msisdn;
        proxy_set_header X-UP-CALLING-LINE-ID $safe_x_up_calling_line_id;
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN $safe_x_wap_network_client_msisdn;
        proxy_set_header X-MCC $safe_x_mcc;
        proxy_set_header X-MNC $safe_x_mnc;
        proxy_set_header X-Operator-ID $safe_x_operator_id;
        proxy_set_header X-HE-Trusted-Proxy $he_trusted_proxy;
    }

    # Campaign shortlinks with HE capture
    location ~ ^/c/([a-zA-Z0-9_-]+)$ {
        limit_req zone=he_bootstrap_limit burst=50 nodelay;

        proxy_pass http://acquisition-api/v1/he/bootstrap/campaign/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-MSISDN $safe_x_msisdn;
        proxy_set_header X-UP-CALLING-LINE-ID $safe_x_up_calling_line_id;
        proxy_set_header X_WAP_NETWORK_CLIENT_MSISDN $safe_x_wap_network_client_msisdn;
        proxy_set_header X-MCC $safe_x_mcc;
        proxy_set_header X-MNC $safe_x_mnc;
        proxy_set_header X-Operator-ID $safe_x_operator_id;
        proxy_set_header X-HE-Trusted-Proxy $he_trusted_proxy;
    }

    # All other HTTP traffic -> HTTPS redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

