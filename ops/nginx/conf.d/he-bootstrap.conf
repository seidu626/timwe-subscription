# Header Enrichment Bootstrap Configuration
# ===========================================
# This config handles HTTP-only operator Header Enrichment (HE) for Ghana MNOs.
# 
# SECURITY: HE headers are only trusted from operator proxy IPs.
# All other traffic has HE headers stripped at the edge.
#
# Documentation: docs/HE_HTTP_BOOTSTRAP_GUIDE.md

# ============================================
# Geo block: Map client IP to trusted HE proxy status
# ============================================
# IMPORTANT: Update these CIDRs with actual operator proxy ranges from:
# - MTN Ghana integration team
# - Telecel Ghana (ex-Vodafone) integration team  
# - AT Ghana (ex-AirtelTigo) integration team
#
# Format: geo $variable { CIDR value; default default_value; }

geo $he_trusted_proxy {
    default 1;  # DISCOVERY MODE: Trust all IPs temporarily to identify operator proxies
    
    # ============================================
    # PLACEHOLDER: Replace with actual operator CIDRs
    # ============================================
    # MTN Ghana proxy ranges (example - get real CIDRs from MTN)
    # 41.223.128.0/18    1;
    # 197.210.0.0/16     1;
    
    # Telecel Ghana proxy ranges (example - get real CIDRs from Telecel)
    # 102.176.0.0/16     1;
    
    # AT Ghana proxy ranges (example - get real CIDRs from AT Ghana)
    # 105.0.0.0/8        1;
    
    # ============================================
    # Development/staging: Allow local testing
    # REMOVE THESE IN PRODUCTION
    # ============================================
    127.0.0.1          1;
    10.0.0.0/8         1;
    172.16.0.0/12      1;
    192.168.0.0/16     1;
}

# ============================================
# Map: Conditionally strip HE headers from untrusted sources
# ============================================
# When $he_trusted_proxy is 0, these map to empty string (stripped)
# When $he_trusted_proxy is 1, these map to the actual header value

map $he_trusted_proxy$http_x_msisdn $safe_x_msisdn {
    "~^1"   $http_x_msisdn;
    default "";
}

map $he_trusted_proxy$http_x_up_calling_line_id $safe_x_up_calling_line_id {
    "~^1"   $http_x_up_calling_line_id;
    default "";
}

map $he_trusted_proxy$http_x_wap_network_client_msisdn $safe_x_wap_network_client_msisdn {
    "~^1"   $http_x_wap_network_client_msisdn;
    default "";
}

map $he_trusted_proxy$http_x_mcc $safe_x_mcc {
    "~^1"   $http_x_mcc;
    default "";
}

map $he_trusted_proxy$http_x_mnc $safe_x_mnc {
    "~^1"   $http_x_mnc;
    default "";
}

map $he_trusted_proxy$http_x_operator_id $safe_x_operator_id {
    "~^1"   $http_x_operator_id;
    default "";
}

# ============================================
# Upstream for acquisition-api (HE bootstrap handler)
# ============================================
upstream acquisition-api {
    server 127.0.0.1:8084;
}

# ============================================
# Rate limiting for HE bootstrap endpoint
# ============================================
# Limit to 10 requests per second per IP to prevent abuse
limit_req_zone $binary_remote_addr zone=he_bootstrap_limit:10m rate=10r/s;

# ============================================
# Logging format for HE debugging (masks MSISDN)
# ============================================
# Use this format temporarily to debug HE header presence
log_format he_debug '$remote_addr [$time_local] "$request" $status '
                    'trusted=$he_trusted_proxy '
                    'msisdn_present=$http_x_msisdn '
                    'upclid_present=$http_x_up_calling_line_id';
