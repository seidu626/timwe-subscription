# Upstream definitions - using localhost addresses for local server deployment
# Docker containers expose ports to 127.0.0.1
upstream webspa-admin {
    server 127.0.0.1:4200;
}

upstream landing-web {
    server 127.0.0.1:3000;
}

upstream krakend {
    server 127.0.0.1:8080;
}

# NOTE: Production HTTPS servers are defined in ssl.conf
# These HTTP servers are for local development only

# Admin Panel - webspa-admin (local dev)
server {
    listen 80;
    server_name admin.localhost;

    location / {
        proxy_pass http://webspa-admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Landing Pages (local dev)
server {
    listen 80;
    server_name landing.localhost;

    location / {
        proxy_pass http://landing-web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# API Gateway (local dev)
server {
    listen 80;
    server_name api.localhost;

    # KrakenD is the single API gateway for this host.
    location / {
        proxy_pass http://krakend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header External-Tx-Id $http_external_tx_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# Default server - catch all
server {
    listen 80 default_server;
    server_name _;

    # Health check for load balancers
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect to admin by default or return 404
    location / {
        return 404;
    }
}
