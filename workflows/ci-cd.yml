name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build Docker images
        run: docker-compose build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run tests
        run: go test ./... -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v1
        with:
          manifests: |
            ./k8s/deployment.yaml
            ./k8s/service.yaml
          images: subscription-service:latest
          namespace: prod
