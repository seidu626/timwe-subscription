story:
  id: "TMP-009"
  title: "Ad partner receives tenant-specific conversion postbacks"
  actor: "ad-or-traffic-partner"
  action: "receive configured postbacks generated from tenant campaign attribution and charge success"
  outcome: "conversion delivery is provider-specific, tenant-scoped, and recoverable through DLQ"
  as_a: "ad-or-traffic-partner"
  i_want_to: "receive conversion postbacks for the tenant campaign I supplied traffic to"
  so_that: "campaign billing and optimization are attributed to the right provider"

entrypoints:
  - "POST /internal/acquisition/charge-success"
  - "GET /v1/admin/postbacks"
  - "POST /v1/admin/postbacks/{id}/retry"

acceptance_criteria:
  happy:
    - scenario: "Tenant conversion postback queued"
      given: ["charged transaction has tenant_id, campaign, provider, click_id, and conversion rule"]
      when: "charge success endpoint is called"
      then: "postback_outbox row is created with tenant_id, provider, rendered URL, and PENDING status"
      evidence: "internal handler/service test"
    - scenario: "Tenant DLQ retry"
      given: ["tenant owns DLQ postback"]
      when: "tenant admin retries it"
      then: "status resets to PENDING and attempt state is preserved"
      evidence: "postback admin test"
  failures:
    - scenario: "Missing click id"
      given: ["provider template requires click_id but transaction lacks it"]
      when: "postback is built"
      then: "no invalid URL is delivered; failure is recorded for operator visibility"
      evidence: "template service test"
    - scenario: "Provider template missing"
      given: ["campaign has no conversion template for provider"]
      when: "charge success arrives"
      then: "system records skipped/no-template state without panic"
      evidence: "service test"
    - scenario: "Cross-tenant DLQ access"
      given: ["postback belongs to another tenant"]
      when: "admin queries or retries it"
      then: "API returns 404 or 403"
      evidence: "handler test"
  edges:
    - scenario: "Postback timeout reaches DLQ"
      given: ["target fails until max attempts"]
      when: "dispatcher processes retries"
      then: "status becomes DLQ with attempt history"
      evidence: "worker test with fake HTTP client"
  invariants:
    - rule: "Postbacks are idempotent and recoverable"
      preserved_by: "outbox/attempt state machine and tenant-scoped retry"
      violated_when: "same conversion emits duplicate active postbacks"
      test: "duplicate charge success test"
    - rule: "PII is protected in postbacks"
      preserved_by: "template context uses msisdn_hash unless explicit approved template"
      violated_when: "raw MSISDN sent to default external postback"
      test: "rendered URL assertion"

out_of_scope:
  - "new provider marketplace"
  - "billing reconciliation UI"

size_check:
  files_touched: 14
  migrations: 1
  endpoints: 3

value_gate:
  required_verdict: "PASS before implementation handoff"
  report_path: "slices/TMP-009-postback-and-attribution-routing/value-gate-report.md"
