story:
  id: "TMP-001"
  title: "Platform operator creates a tenant context that protected APIs can resolve"
  actor: "platform-operator"
  action: "create a tenant and retrieve the current tenant context through protected admin APIs"
  outcome: "tenant identity becomes the root scope for later admin, campaign, channel, and reporting work"
  as_a: "platform-operator"
  i_want_to: "create a tenant and verify request tenant context"
  so_that: "all future platform data can be scoped to a tenant instead of global defaults"

entrypoints:
  - "POST /v1/admin/tenants"
  - "GET /v1/admin/tenants/current"

acceptance_criteria:
  happy:
    - scenario: "Create tenant"
      given: ["platform operator has a valid admin JWT", "tenant key is unique"]
      when: "operator posts tenant name, key, status, default country, and metadata"
      then: "API returns 201 with tenant_id, tenant_key, status, and audit log reference"
      evidence: "handler/service/repository tests assert response body and persisted row"
    - scenario: "Resolve current tenant"
      given: ["request contains a valid tenant claim or header accepted by gateway policy"]
      when: "operator calls GET /v1/admin/tenants/current"
      then: "API returns the resolved tenant and no unrelated tenants"
      evidence: "route test asserts tenant_id and no secret/config leakage"
  failures:
    - scenario: "Missing tenant context"
      given: ["protected request lacks tenant claim/header"]
      when: "actor calls current tenant endpoint"
      then: "API returns 401 or 403 and performs no lookup fallback"
      evidence: "test asserts status and no default tenant use"
    - scenario: "Duplicate tenant key"
      given: ["tenant key already exists"]
      when: "operator creates another tenant with same key"
      then: "API returns 409 and does not mutate existing tenant"
      evidence: "repository test asserts one row remains"
    - scenario: "Unknown tenant"
      given: ["request references a tenant id that does not exist"]
      when: "actor calls protected endpoint"
      then: "API returns 404 or 403 without leaking other tenant data"
      evidence: "test asserts empty body for cross-tenant data"
  edges:
    - scenario: "Inactive tenant"
      given: ["tenant exists but status is inactive"]
      when: "tenant admin calls protected API"
      then: "API rejects with tenant_inactive"
      evidence: "service test asserts error code"
  invariants:
    - rule: "Admin mutations must be authenticated and auditable"
      preserved_by: "tenant create records actor, request id, before/after metadata"
      violated_when: "tenant row exists with no activity log"
      test: "assert tenant row and admin_activity_logs row in same success path"
    - rule: "No global fallback tenant behavior in protected paths"
      preserved_by: "tenant resolver returns error on missing or unknown context"
      violated_when: "request without tenant receives data"
      test: "negative route test"
    - rule: "Tenant key uniqueness"
      preserved_by: "database unique constraint and service conflict handling"
      violated_when: "two tenants share a key"
      test: "concurrent create conflict test"

out_of_scope:
  - "tenant-scoping every existing table"
  - "tenant admin UI screens"
  - "channel credentials"

size_check:
  files_touched: 14
  migrations: 1
  endpoints: 2

value_gate:
  required_verdict: "PASS before implementation handoff"
  report_path: "slices/TMP-001-tenant-context/value-gate-report.md"

