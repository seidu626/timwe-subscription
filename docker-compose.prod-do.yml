  # ============================================
  # Infrastructure Services
  # ============================================
  # Redis runs on host - not in Docker
  # redis:
  #   image: redis:7-alpine
  #   container_name: subscription_redis
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - backend
  #   volumes:
  #     - redis_data:/data
  #   restart: always

  # Portainer (Docker UI) - bound to localhost (use SSH tunnel)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "127.0.0.1:9443:9443"
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  portainer_data:
  minio_data:
