services:
  subscription-partner:
    image: xper626/subscription-partner:latest
    container_name: subscription-partner
    ports:
      - "8081:8081"
    environment:
      - APP_DATABASE_POSTGRESQL_HOST=database
      - APP_DATABASE_POSTGRESQL_PORT=5432
      - APP_DATABASE_POSTGRESQL_USER=${PG_USER}
      - APP_DATABASE_POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - APP_DATABASE_POSTGRESQL_DB_NAME=${PG_DB}
      - APP_DATABASE_POSTGRESQL_SSL_MODE=disable
      - APP_CACHE_REDIS_HOST=redis
      - APP_CACHE_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - database
      - redis
    networks:
      - backend

  subscription-external:
    image: xper626/subscription-external:latest
    container_name: subscription-external
    ports:
      - "8083:8083"
    environment:
      - APP_DATABASE_POSTGRESQL_HOST=database
      - APP_DATABASE_POSTGRESQL_PORT=5432
      - APP_DATABASE_POSTGRESQL_USER=${PG_USER}
      - APP_DATABASE_POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - APP_DATABASE_POSTGRESQL_DB_NAME=${PG_DB}
      - APP_DATABASE_POSTGRESQL_SSL_MODE=disable
      - TIMWE_API_KEY=${TIMWE_API_KEY}
      - TIMWE_PSK=${TIMWE_PSK}
      - ACQUISITION_API_URL=http://acquisition-api:8084
    depends_on:
      - database
    networks:
      - backend

  notification:
    image: xper626/notification-service:latest
    container_name: notification-service
    ports:
      - "8082:8082"
    environment:
      - APP_DATABASE_POSTGRESQL_HOST=database
      - APP_DATABASE_POSTGRESQL_PORT=5432
      - APP_DATABASE_POSTGRESQL_USER=${PG_USER}
      - APP_DATABASE_POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - APP_DATABASE_POSTGRESQL_DB_NAME=${PG_DB}
      - APP_DATABASE_POSTGRESQL_SSL_MODE=disable
      - APP_CACHE_REDIS_HOST=redis
      - APP_CACHE_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - database
      - redis
    networks:
      - backend

  notification-worker:
    image: xper626/notification-service:latest
    container_name: notification-worker
    command: ["./notification-worker"]
    environment:
      - APP_DATABASE_POSTGRESQL_HOST=database
      - APP_DATABASE_POSTGRESQL_PORT=5432
      - APP_DATABASE_POSTGRESQL_USER=${PG_USER}
      - APP_DATABASE_POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - APP_DATABASE_POSTGRESQL_DB_NAME=${PG_DB}
      - APP_DATABASE_POSTGRESQL_SSL_MODE=disable
      - NOTIFICATION_WORKER_MT_BASE_URL=http://subscription-external:8083
      - NOTIFICATION_WORKER_MT_CHANNEL=${NOTIFICATION_WORKER_MT_CHANNEL:-SMS}
    depends_on:
      - database
      - subscription-external
    networks:
      - backend

  cadence-engine:
    image: xper626/cadence-engine:latest
    container_name: cadence-engine
    ports:
      - "8091:8091"
    environment:
      - APP_DATABASE_POSTGRESQL_HOST=database
      - APP_DATABASE_POSTGRESQL_PORT=5432
      - APP_DATABASE_POSTGRESQL_USER=${PG_USER}
      - APP_DATABASE_POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - APP_DATABASE_POSTGRESQL_DB_NAME=${PG_DB}
      - APP_DATABASE_POSTGRESQL_SSL_MODE=disable
      - CADENCE_ADMIN_HTTP_ADDR=:8091
      - ADMIN_AUTH0_DOMAIN=${ADMIN_AUTH0_DOMAIN}
      - ADMIN_AUTH0_AUDIENCE=${ADMIN_AUTH0_AUDIENCE:-https://dev-chliep5q.auth0.com/api/v2/}
      - CADENCE_ADMIN_CORS_ORIGINS=${CADENCE_ADMIN_CORS_ORIGINS:-*}
    depends_on:
      - database
    networks:
      - backend

  postback-dispatcher:
    image: xper626/postback-dispatcher:latest
    container_name: postback-dispatcher
    environment:
      - DATABASE_POSTGRESQL_HOST=database
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_USER=${PG_USER}
      - DATABASE_POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - DATABASE_POSTGRESQL_DB_NAME=${PG_DB}
    depends_on:
      - database
    networks:
      - backend
    restart: unless-stopped

  landing-web:
    image: xper626/landing-web:latest
    container_name: landing-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ACQUISITION_API_URL=${NEXT_PUBLIC_ACQUISITION_API_URL:-http://localhost:8080}
    depends_on:
      - acquisition-api
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: subscription_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: always

  database:
    image: postgres:${POSTGRESQL_VERSION}
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD:  ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    container_name: subscription_manager_db
    ports:
      - "5432:5432"
    restart: always
    networks:
      - backend
    volumes:
      - db_data:/var/lib/postgresql/data

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest #https://hevodata.com/learn/pgadmin-docker/#s2
    #network_mode: host
    networks:
      - backend
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: ${PGADMIN_LISTEN_PORT}
    ports:
      - "5439:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  acquisition-api:
    image: xper626/acquisition-api:latest
    container_name: acquisition-api
    ports:
      - "8084:8084"
    environment:
      - APP_DATABASE_POSTGRESQL_HOST=database
      - APP_DATABASE_POSTGRESQL_PORT=5432
      - APP_DATABASE_POSTGRESQL_USER=${PG_USER}
      - APP_DATABASE_POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - APP_DATABASE_POSTGRESQL_DB_NAME=${PG_DB}
      - APP_DATABASE_POSTGRESQL_SSL_MODE=disable
      - TIMWE_API_KEY=${TIMWE_API_KEY}
      - TIMWE_PSK=${TIMWE_PSK}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - ADMIN_AUTH0_DOMAIN=${ADMIN_AUTH0_DOMAIN}
      - ADMIN_AUTH0_AUDIENCE=${ADMIN_AUTH0_AUDIENCE:-https://dev-chliep5q.auth0.com/api/v2/}
      - ACQUISITION_ADMIN_CORS_ORIGINS=${ACQUISITION_ADMIN_CORS_ORIGINS:-*}
      - CAMPAIGN_ASSET_STORAGE_ENABLED=${CAMPAIGN_ASSET_STORAGE_ENABLED:-false}
      - CAMPAIGN_ASSET_STORAGE_ENDPOINT=${CAMPAIGN_ASSET_STORAGE_ENDPOINT:-}
      - CAMPAIGN_ASSET_STORAGE_BUCKET=${CAMPAIGN_ASSET_STORAGE_BUCKET:-}
      - CAMPAIGN_ASSET_STORAGE_REGION=${CAMPAIGN_ASSET_STORAGE_REGION:-}
      - CAMPAIGN_ASSET_STORAGE_ACCESS_KEY_ID=${CAMPAIGN_ASSET_STORAGE_ACCESS_KEY_ID:-}
      - CAMPAIGN_ASSET_STORAGE_SECRET_ACCESS_KEY=${CAMPAIGN_ASSET_STORAGE_SECRET_ACCESS_KEY:-}
      - CAMPAIGN_ASSET_STORAGE_USE_SSL=${CAMPAIGN_ASSET_STORAGE_USE_SSL:-true}
      - CAMPAIGN_ASSET_STORAGE_PUBLIC_BASE_URL=${CAMPAIGN_ASSET_STORAGE_PUBLIC_BASE_URL:-}
      - CAMPAIGN_ASSET_STORAGE_KEY_PREFIX=${CAMPAIGN_ASSET_STORAGE_KEY_PREFIX:-campaign-backgrounds}
      - CAMPAIGN_ASSET_STORAGE_MAX_UPLOAD_BYTES=${CAMPAIGN_ASSET_STORAGE_MAX_UPLOAD_BYTES:-2097152}
      - CAMPAIGN_ASSET_STORAGE_PRESIGN_EXPIRY=${CAMPAIGN_ASSET_STORAGE_PRESIGN_EXPIRY:-10m}
    depends_on:
      - database
    networks:
      - backend

  krakend:
    image: xper626/krakend-timwe-ma:latest
    container_name: krakend
    volumes:
      - ./krakend:/etc/krakend
    ports:
      - "8080:8080"
    environment:
      - FC_ENABLE=1
      - subscription_api_url=http://subscription-partner:8081
      - subscription_external_api_url=http://subscription-external:8083
      - notification_api_url=http://notification:8082
      - acquisition_api_url=http://acquisition-api:8084
      - landing_web_url=http://landing-web:3000
    command: [ "run", "-d", "-c", "/etc/krakend/config/krakend.tmpl" ]
    networks:
      - backend
    depends_on:
      - subscription-partner
      - subscription-external
      - notification
      - acquisition-api
      - landing-web

networks:
  backend:
    driver: bridge

volumes:
  db_data:
  pgadmin-data:
      driver: local
