name: Codex Gate (internal)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex_gate:
    # Only run for same-repo PRs (avoid forks; secrets are not available for fork PRs by default).
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    outputs:
      gate_json: ${{ steps.codex.outputs.final-message }}

    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Produce pr.diff (changes only)
        run: |
          set -euo pipefail
          # Merge commits have at least one parent; first parent is typically the base branch.
          git diff --no-color HEAD^1..HEAD > pr.diff || true

      - name: Check Codex configuration
        id: codex_config
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${OPENAI_API_KEY}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured; skipping optional Codex gate."
          fi

      # Run Codex as the last step in the job when possible (recommended by the Codex Action security guidance).
      - name: Run Codex gate (structured JSON)
        id: codex
        if: ${{ steps.codex_config.outputs.configured == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

          prompt-file: .github/codex/prompts/review_gate.md
          output-schema-file: .github/codex/schemas/review_gate.schema.json
          output-file: codex-gate.json

          safety-strategy: drop-sudo
          sandbox: read-only
          codex-home: .codex-home
          codex-args: '["--ask-for-approval","never"]'

  comment_and_gate:
    runs-on: ubuntu-latest
    needs: codex_gate
    if: ${{ needs.codex_gate.outputs.gate_json != '' }}

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Post gate output and fail on P0
        uses: actions/github-script@v7
        env:
          GATE_JSON: ${{ needs.codex_gate.outputs.gate_json }}
        with:
          github-token: ${{ github.token }}
          script: |
            let data;
            try {
              data = JSON.parse(process.env.GATE_JSON);
            } catch (e) {
              core.setFailed("Codex gate output was not valid JSON. Failing the gate.");
              return;
            }

            const decision = data.decision;
            const p0 = data.p0_count;
            const p1 = data.p1_count;

            // Build a readable comment (keep gating logic explicit).
            let body = `## Codex Gate Review\n`;
            body += `**Decision:** \`${decision}\`  \n`;
            body += `**P0:** ${p0}  **P1:** ${p1}\n\n`;
            body += `### Summary\n${data.summary}\n\n`;
            body += `### Findings\n`;
            for (const f of (data.findings || [])) {
              body += `- [${f.severity}] **${f.title}** — ${f.where}\n  - ${f.recommendation}\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

            if (decision === "block" || (p0 || 0) > 0) {
              core.setFailed(`Blocking merge: decision=${decision}, p0=${p0}`);
            }
