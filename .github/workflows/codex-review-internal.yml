name: Codex PR Review (internal)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex_review:
    # Only run for same-repo PRs (avoid forks; secrets are not available for fork PRs by default).
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}

    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      # Run Codex as the last step in the job when possible (recommended by the Codex Action security guidance).
      - name: Run Codex review (markdown)
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

          prompt-file: .github/codex/prompts/review.md
          output-file: codex-output.md

          # Security posture recommended on GitHub-hosted runners.
          safety-strategy: drop-sudo

          # Review-only by default; switch to workspace-write if you explicitly want to run commands.
          sandbox: read-only

          # Non-interactive execution.
          codex-args: '["--ask-for-approval","never"]'

  post_comment:
    runs-on: ubuntu-latest
    needs: codex_review
    if: ${{ needs.codex_review.outputs.final_message != '' }}

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Post Codex review as PR comment
        uses: actions/github-script@v7
        env:
          BODY: ${{ needs.codex_review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.BODY,
            });
