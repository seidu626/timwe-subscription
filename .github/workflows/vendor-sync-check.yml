name: Vendor Sync Check

on:
  pull_request:
    paths:
      - "common/**"
      - "services/**/go.mod"
      - "services/**/go.sum"
      - "services/**/Dockerfile"
      - "scripts/check-vendor-sync.sh"
  push:
    branches:
      - main
    paths:
      - "common/**"
      - "services/**/go.mod"
      - "services/**/go.sum"
      - "services/**/Dockerfile"
      - "scripts/check-vendor-sync.sh"

jobs:
  vendor-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"

      - name: Verify vendored dependencies are in sync
        run: ./scripts/check-vendor-sync.sh

