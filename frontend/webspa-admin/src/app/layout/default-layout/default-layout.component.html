<!--sidebar-->
<c-sidebar #sidebar1="cSidebar"
  class="d-print-none sidebar sidebar-fixed border-end admin-sidebar"
  colorScheme="dark"
  id="sidebar1"
  visible>
  <c-sidebar-header class="border-bottom sidebar-header-custom">
    <c-sidebar-brand [brandFull]="{
      src: 'assets/logo.jpg',
      width: 180,
      height: 76,
      alt: 'Logo'
    }" [brandNarrow]="{
      src: 'assets/logo.jpg',
      width: 90,
      height: 46,
      alt: 'Logo'
    }" routerLink="#">
    </c-sidebar-brand>
  </c-sidebar-header>

  <ng-scrollbar #scrollbar="ngScrollbar" (updated)="onScrollbarUpdate(scrollbar.state)" class="overflow"
    pointerEventsMethod="scrollbar" visibility="hover">
    <c-sidebar-nav #overflow [navItems]="navItems" dropdownMode="close" compact />
  </ng-scrollbar>
  @if (!sidebar1.narrow) {
  <c-sidebar-footer cSidebarToggle="sidebar1" class="border-top d-none d-lg-flex sidebar-footer-custom" toggle="unfoldable">
    <button cSidebarToggler aria-label="Toggle sidebar fold"></button>
  </c-sidebar-footer>
  }
</c-sidebar>

<!--main-->
<div class="wrapper admin-wrapper d-flex flex-column min-vh-100">
  <!--app-header-->
  <app-default-header [cShadowOnScroll]="'sm'" class="d-print-none header header-sticky p-0 shadow-sm"
    position="sticky" sidebarId="sidebar1" />
  <!--app-body-->
  <div class="body flex-grow-1">
    <c-container breakpoint="xxl" class="h-auto px-4 admin-page-container">
      <router-outlet />
    </c-container>
  </div>
  <!--app footer-->
  <app-default-footer />
</div>
