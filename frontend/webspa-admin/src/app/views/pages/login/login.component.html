<main class="login-page">
  <section class="login-shell">
    <div class="login-panel">
      <p class="eyebrow">webspa-admin</p>
      <h1>Operator access</h1>
      <p class="login-copy">Authenticate with Auth0 to enter the tenant operations workspace.</p>

      <div *ngIf="isLoading$ | async" class="login-state">
        <c-spinner color="primary"></c-spinner>
        <span>Authenticating...</span>
      </div>

      <div *ngIf="error$ | async as error" class="login-alert" role="alert">
        <strong>Authentication error</strong>
        <span>{{ error.message }}</span>
      </div>

      <form cForm *ngIf="!(isLoading$ | async)" class="login-form">
        <button cButton color="primary" type="button" (click)="login()">
          Login with Auth0
        </button>
      </form>
    </div>

    <aside class="access-panel">
      <div>
        <p class="eyebrow">Access control</p>
        <h2>Managed identity, scoped tenants.</h2>
      </div>
      <div class="access-list">
        <span>Auth0-backed accounts</span>
        <span>Tenant workspace routing</span>
        <span>Role-based admin access</span>
      </div>
    </aside>
  </section>
</main>
