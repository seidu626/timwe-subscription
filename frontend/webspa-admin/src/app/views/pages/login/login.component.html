<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col lg="10" xl="8">
        <c-card-group>
          <c-card class="p-4">
            <c-card-body>
              <!-- Loading State -->
              <div *ngIf="isLoading$ | async" class="text-center py-5">
                <c-spinner color="primary"></c-spinner>
                <p class="mt-3 text-body-secondary">Authenticating...</p>
              </div>

              <!-- Error State -->
              <div *ngIf="error$ | async as error" class="alert alert-danger" role="alert">
                <strong>Authentication Error:</strong> {{ error.message }}
              </div>

              <!-- Login Form -->
              <form cForm *ngIf="!(isLoading$ | async)">
                <h1>Login</h1>
                <p class="text-body-secondary">Authenticate with Auth0 to access admin features.</p>
                <c-row>
                  <c-col xs="6">
                    <button cButton class="px-4" color="primary" type="button" (click)="login()">
                      Login with Auth0
                    </button>
                  </c-col>
                </c-row>
              </form>
            </c-card-body>
          </c-card>
          <c-card [ngStyle]="{'minWidth.%': 44}" class="text-white bg-primary py-5">
            <c-card-body class="text-center">
              <div>
                <h2>Access control</h2>
                <p>Accounts and access are managed in Auth0. Contact your administrator if you need access.</p>
              </div>
            </c-card-body>
          </c-card>
        </c-card-group>
      </c-col>
    </c-row>
  </c-container>
</div>
