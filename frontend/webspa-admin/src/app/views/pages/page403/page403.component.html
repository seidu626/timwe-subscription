<div class="tenant-denied-shell">
  <ng-container *ngIf="(view$ | async) as view">
    <div class="tenant-denied-stack">
      <span class="tenant-denied-status">Workspace access</span>

      <div class="tenant-denied-headline">
        <h1 class="tenant-denied-title">{{ view.title }}</h1>
        <p class="tenant-denied-copy">{{ view.description }}</p>
        <p class="tenant-denied-hint" *ngIf="view.hint">{{ view.hint }}</p>
      </div>

      <div class="tenant-denied-actions">
        <button cButton color="primary" type="button" *ngIf="view.canRetry; else dashboardLink" (click)="retry()">
          Retry
        </button>
        <ng-template #dashboardLink>
          <button cButton color="primary" type="button" routerLink="/dashboard">Go to dashboard</button>
        </ng-template>
        <ng-container *ngIf="(isAuthenticated$ | async); else loginAction">
          <button cButton color="secondary" variant="ghost" type="button" (click)="logout()">Sign out</button>
        </ng-container>
        <ng-template #loginAction>
          <button cButton color="secondary" variant="ghost" type="button" (click)="login()">Sign in</button>
        </ng-template>
      </div>

      <ng-container *ngIf="view.showTenantPanel">
        <div class="tenant-denied-divider"></div>

        <div>
          <div class="tenant-denied-panel-title">
            {{ view.workspace.canSwitchTenant ? 'Choose workspace' : 'Active workspace' }}
          </div>

          <ng-container *ngIf="view.workspace.canSwitchTenant; else singleTenant">
            <div class="tenant-option-list">
              <button
                *ngFor="let tenant of view.workspace.availableTenants"
                type="button"
                class="tenant-option"
                (click)="chooseTenant(tenant)">
                <span class="tenant-monogram">{{ monogramFor(tenant) }}</span>
                <span class="tenant-option-meta">
                  <span class="tenant-option-label">{{ tenant.label }}</span>
                  <span class="tenant-option-key">{{ tenant.tenantKey }}</span>
                </span>
                <span class="tenant-option-arrow" aria-hidden="true">&rsaquo;</span>
              </button>
            </div>
          </ng-container>

          <ng-template #singleTenant>
            <div class="tenant-denied-current" *ngIf="view.workspace.currentTenant as currentTenant">
              <span class="tenant-monogram">{{ monogramFor(currentTenant) }}</span>
              <span class="tenant-option-meta">
                <span class="tenant-option-label">{{ currentTenant.label }}</span>
                <span class="tenant-option-key">{{ currentTenant.tenantKey }}</span>
              </span>
            </div>
          </ng-template>
        </div>
      </ng-container>
    </div>
  </ng-container>
</div>
