<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <base href="./">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta manifest="manifest.appcache">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Subscription Admin Portal">
  <meta name="author" content="Seidu Abdulai">
  <meta name="keyword" content="Subscription Admin Dashboard">

  <!-- Favicon -->
  <link rel="shortcut icon" href="assets/favicon.ico">
  <link href="assets/favicon.ico" rel="icon" type="image/x-icon">

  <title>Subscription Admin</title>

  <!-- Theme colors - Using professional indigo primary -->
  <meta name="msapplication-TileColor" content="#4f46e5">
  <meta name="msapplication-TileImage" content="assets/favicon.ico">
  <meta name="theme-color" content="#4f46e5">

  <!-- Mobile capabilities -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Preconnect to Google Fonts for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts - Inter and Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Inline critical CSS for faster first paint -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    .app-loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .app-loading-text {
      margin-top: 16px;
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="mat-typography">
  <noscript>
    <div style="padding: 20px; text-align: center; font-family: sans-serif;">
      <h2>JavaScript Required</h2>
      <p>You need to enable JavaScript to run this application.</p>
    </div>
  </noscript>

  <app-root>
    <div class="app-loading">
      <div class="app-loading-spinner"></div>
      <span class="app-loading-text">Loading Subscription Admin...</span>
    </div>
  </app-root>

  <script>
    parent.postMessage(location.hash, location.origin);
  </script>
</body>

</html>
