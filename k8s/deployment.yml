apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
    spec:
      containers:
        - name: billing-service
          image: billing-service:latest
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acquisition-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acquisition-api
  template:
    metadata:
      labels:
        app: acquisition-api
    spec:
      containers:
        - name: acquisition-api
          image: xper626/acquisition-api:latest
          ports:
            - containerPort: 8084
          env:
            - name: APP_DATABASE_POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: APP_DATABASE_POSTGRESQL_PORT
              value: "5432"
            - name: APP_DATABASE_POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: APP_DATABASE_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: APP_DATABASE_POSTGRESQL_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
            - name: APP_DATABASE_POSTGRESQL_SSL_MODE
              value: "require"
            - name: TIMWE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: timwe-credentials
                  key: api-key
            - name: TIMWE_PSK
              valueFrom:
                secretKeyRef:
                  name: timwe-credentials
                  key: psk
            - name: ADMIN_AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: admin-auth0
                  key: domain
            - name: ADMIN_AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: admin-auth0
                  key: audience
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: acquisition-api
spec:
  selector:
    app: acquisition-api
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadence-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cadence-engine
  template:
    metadata:
      labels:
        app: cadence-engine
    spec:
      containers:
        - name: cadence-engine
          image: xper626/cadence-engine:latest
          ports:
            - containerPort: 8091
          env:
            - name: APP_DATABASE_POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: APP_DATABASE_POSTGRESQL_PORT
              value: "5432"
            - name: APP_DATABASE_POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: APP_DATABASE_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: APP_DATABASE_POSTGRESQL_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
            - name: APP_DATABASE_POSTGRESQL_SSL_MODE
              value: "require"
            - name: CADENCE_ADMIN_HTTP_ADDR
              value: ":8091"
            - name: ADMIN_AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: admin-auth0
                  key: domain
            - name: ADMIN_AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: admin-auth0
                  key: audience
            - name: CADENCE_ADMIN_CORS_ORIGINS
              value: "*"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: cadence-engine
spec:
  selector:
    app: cadence-engine
  ports:
    - protocol: TCP
      port: 8091
      targetPort: 8091
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-worker
  template:
    metadata:
      labels:
        app: notification-worker
    spec:
      containers:
        - name: notification-worker
          image: xper626/notification-service:latest
          imagePullPolicy: Always
          command: ["./notification-worker"]
          env:
            - name: DB_POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_POSTGRESQL_PORT
              value: "5432"
            - name: DB_POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_POSTGRESQL_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
            - name: DB_POSTGRESQL_SSL_MODE
              value: "require"
            - name: NOTIFICATION_WORKER_MT_BASE_URL
              value: "http://subscription-external:8083"
            - name: NOTIFICATION_WORKER_MT_CHANNEL
              value: "SMS"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

